name: NBA Data Quality Monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs every day at 9:00 AM EST (14:00 UTC)
    # Monitors live NBA data automatically — no manual trigger needed
    - cron: "0 14 * * *"

jobs:
  unit-tests:
    name: Unit Tests (no network)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: reports/

  integration-tests:
    name: Integration + Contract Tests (live ESPN data)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration and contract tests
        run: python -m pytest tests/integration/ tests/contract/ -v

      - name: Upload full test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: reports/coverage/
