name: Deploy Dashboard to GitHub Pages

# When this workflow runs:
#   - on every push to main  -> your latest code/data goes live
#   - once a day at 14:00 UTC (9:00 AM EST) -> the automatic daily refresh
#   - manually, via the "Run workflow" button on the repo's Actions tab
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

# Permissions this job needs: write to the repo (to save refreshed NBA data)
# and publish to GitHub Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Never run two deploys at once; if a newer run starts, cancel the older one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # ---------- 1. Pull fresh NBA data ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Pull fresh NBA data and rebuild results.json
        # GitHub's servers are US-based, so the NBA API that times out on a home
        # network usually works here. If it doesn't, generate_report.py exits
        # cleanly and keeps the existing data. continue-on-error means even an
        # unexpected data hiccup never blocks the deploy.
        continue-on-error: true
        run: python generate_report.py

      # ---------- 2. Save the refreshed data back to the repo ----------
      # This is what makes the trend chart grow over time and puts a green
      # square on your GitHub contributions graph every day.
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/results.json frontend/public/results-history.json
          git commit -m "chore: daily NBA data refresh [skip ci]" || echo "No data changes to commit."
          git push || echo "Nothing to push."

      # ---------- 3. Build the React dashboard ----------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build the dashboard
        run: npm run build
        working-directory: frontend

      # ---------- 4. Publish to GitHub Pages ----------
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
