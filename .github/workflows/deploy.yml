name: Deploy Dashboard to GitHub Pages

# When this workflow runs:
#   - on every push to main  -> your latest code/data goes live
#   - once a day at 14:00 UTC (9:00 AM EST) -> the automatic daily refresh
#   - manually, via the "Run workflow" button on the repo's Actions tab
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

# Permissions this job needs: write to the repo (to save refreshed NBA data)
# and publish to GitHub Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one Pages deployment at a time, but DON'T cancel one that's
# already publishing — cancelling a production deploy mid-flight is exactly
# what GitHub's own Pages guidance warns against. Extra runs queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # ---------- 1. Pull fresh NBA data ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Pull fresh NBA data and rebuild results.json
        # Regenerate results.json / results-history.json from ESPN's live data.
        # If ESPN is ever unreachable, generate_report.py exits cleanly and keeps
        # the existing data; continue-on-error means a data hiccup never blocks
        # the deploy. The commit-back of this fresh data happens LAST (below),
        # after the deploy, so a publish and a git push never overlap.
        continue-on-error: true
        run: python generate_report.py

      # ---------- 2. Build the React dashboard ----------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build the dashboard
        run: npm run build
        working-directory: frontend

      # ---------- 3. Publish to GitHub Pages ----------
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      # GitHub Pages' backend intermittently returns "Deployment failed, try
      # again later." — a transient error on their side. So we try once
      # (soft-fail), wait, and retry. The job only fails if BOTH attempts fail.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retrying
        if: steps.deploy1.outcome == 'failure'
        run: sleep 25

      - name: Deploy to GitHub Pages (retry)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4

      # ---------- 4. Save the refreshed data back to the repo (LAST) ----------
      # Done AFTER the deploy so this commit can't move the branch head while
      # GitHub Pages is publishing (that ordering was what made the deploy fail).
      # This is what makes the trend chart accumulate real runs over time.
      - name: Commit refreshed data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/results.json frontend/public/results-history.json
          git commit -m "chore: daily NBA data refresh [skip ci]" || echo "No data changes to commit."
          git push || echo "Nothing to push."
