[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --cov=.
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --html=reports/test-report.html
    --self-contained-html
    -v

markers =
    integration: Tests that hit the live data source (require internet)
    contract: Tests that validate the data layer's response schema
    unit: Pure logic tests with no network calls
